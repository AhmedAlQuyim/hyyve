<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>About — hyyve.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="homepage/shared-styles.css" />
<style>
  body { margin: 0; background: var(--paper-tint); font-family: "Inter Tight", sans-serif; }
  @keyframes hyyve-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: .4; }
    40% { transform: translateY(-4px); opacity: 1; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="homepage/content-store.jsx"></script>
<script type="text/babel" src="homepage/brief-wizard.jsx"></script>
<script type="text/babel" src="homepage/about.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "darkMode": false,
  "accentHue": 60,
  "displayFont": "Fraunces"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [briefOpen, setBriefOpen] = useState(false);

  useEffect(() => {
    const h = t.accentHue;
    document.documentElement.style.setProperty('--amber', `oklch(76% .12 ${h})`);
    document.documentElement.style.setProperty('--amber-deep', `oklch(60% .14 ${h})`);
    document.documentElement.style.setProperty('--amber-soft', `oklch(88% .08 ${h})`);
  }, [t.accentHue]);

  useEffect(() => {
    document.documentElement.style.setProperty('--font-display',
      t.displayFont === "Fraunces"
        ? '"Fraunces", "Times New Roman", serif'
        : '"Inter Tight", -apple-system, system-ui, sans-serif'
    );
  }, [t.displayFont]);

  return (
    <>
      <AboutPage dark={t.darkMode} onOpenBrief={() => setBriefOpen(true)}/>
      {briefOpen && <BriefWizard onClose={() => setBriefOpen(false)}/>}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme"/>
        <TweakToggle label="Dark mode" value={t.darkMode} onChange={v => setTweak('darkMode', v)}/>
        <TweakSection label="Accent"/>
        <TweakSlider label="Hue" value={t.accentHue} min={20} max={120} step={5}
                     onChange={v => setTweak('accentHue', v)}/>
        <TweakSection label="Typography"/>
        <TweakRadio label="Display font" value={t.displayFont}
                    options={["Fraunces", "Inter"]}
                    onChange={v => setTweak('displayFont', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
